<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despoina Tiktopoulou's Portfolio</title>
    <style>
        body {
            font-family: Garamond, Georgia, serif;
            margin: 0;
            padding: 0;
            background-color: teal; /* Changed background to solid color */
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            min-height: 100vh;
            box-sizing: border-box;
        }
        
        .header-container {
            width: 100%;
            background: url('https://imgur.com/G0aK1Jl') no-repeat center center;
            background-size: cover;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            box-sizing: border-box;
        }
        
        header {
           background-color: rgba(247, 247, 247, 0.8);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2em;
            font-weight: 700;
            color: #333333;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 1200px;
            background-color: rgba(255, 255, 255, 0.8);
            box-sizing: border-box;
        }

        .repositories {
            margin-top: 20px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .repository {
            background: #f7f7f7;
            padding: 20px;
            margin: 10px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            width: 100%;
            max-width: 45%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .repository:hover {
            transform: translateY(-5px);
        }

        .repository h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #333333;
        }

        .repository h2 a {
            text-decoration: none;
            color: #333333;
        }

        .repository p {
            margin: 10px 0 0 0;
            font-size: 1em;
            line-height: 1.6;
            color: #333333;
        }

        footer {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: rgba(247, 247, 247, 0.8);
            border-top: 1px solid #e1e4e8;
            box-sizing: border-box;
        }

        footer p {
            margin: 0;
            color: #333333;
        }

        @media (max-width: 768px) {
            .repository {
                width: 100%;
                max-width: 100%;
            }

            .main-content {
                padding: 20px 10px;
            }

            header h1 {
                font-size: 1.5em;
            }
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.2em;
            }

            .repository {
                padding: 15px;
            }

            .repository h2 {
                font-size: 1.2em;
            }

            .repository p {
                font-size: 0.9em;
            }

            footer p {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Despoina Tiktopoulou's portfolio</h1>
         <p class="intro">Welcome to my portfolio! Here you will find a selection of my projects and repositories.</p>
    </header>
    <div class="main-content">
        <div class="repositories" id="repositories">
            <!-- Repositories will be listed here -->
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Despoina Tiktopoulou</p>
    </footer>

    <script>
        async function fetchRepositories() {
            const response = await fetch('https://api.github.com/users/DespoinaTikt/repos');
            const repositories = await response.json();
            const container = document.getElementById('repositories');
            const excludeRepo = 'DespoinaTikt.github.io'; // Name of the repository to exclude

            repositories
                .filter(repo => repo.name !== excludeRepo)
                .forEach(repo => {
                    const repoDiv = document.createElement('div');
                    repoDiv.className = 'repository';
                    repoDiv.innerHTML = `
                        <h2><a href="${repo.html_url}">${repo.name}</a></h2>
                        <p>${repo.description || 'No description available'}</p>
                    `;
                    container.appendChild(repoDiv);
                });
        }

        fetchRepositories();
    </script>
</body>
</html>
