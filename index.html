<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despoina Tiktopoulou's Portfolio</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('image5.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            min-height: 100vh; /* Ensure body covers at least the full viewport height */
            box-sizing: border-box;
        }

        header {
            width: 100%;
            padding: 20px;
            background-color: rgba(247, 247, 247, 0.8); /* Semi-transparent background */
            text-align: center;
            border-bottom: 1px solid #e1e4e8;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            font-size: 2em;
            font-weight: 700;
            color: #333333; /* Dark grey color */
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 1200px;
            background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white background */
            box-sizing: border-box;
        }

        .repositories {
            margin-top: 40px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        .repository {
            background: #f7f7f7;
            padding: 20px;
            margin: 20px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            width: 45%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .repository:hover {
            transform: translateY(-5px);
        }

        .repository h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #333333; /* Dark grey color */
        }

        .repository h2 a {
            text-decoration: none;
            color: #333333; /* Dark grey color */
        }

        .repository p {
            margin: 10px 0 0 0;
            font-size: 1em;
            line-height: 1.6;
            color: #333333; /* Dark grey color */
        }

        footer {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: rgba(247, 247, 247, 0.8); /* Semi-transparent background */
            border-top: 1px solid #e1e4e8;
            box-sizing: border-box;
        }

        footer p {
            margin: 0;
            color: #333333; /* Dark grey color */
        }
    </style>
</head>
<body>
    <header>
        <h1>Despoina Tiktopoulou's Portfolio</h1>
    </header>
    <div class="main-content">
        <div class="repositories" id="repositories">
            <!-- Repositories will be listed here -->
        </div>
    </div>
    <footer>
        <p>&copy; 2024 Despoina Tiktopoulou</p>
    </footer>

    <script>
        async function fetchRepositories() {
            const response = await fetch('https://api.github.com/users/DespoinaTikt/repos');
            const repositories = await response.json();
            const container = document.getElementById('repositories');

            repositories.forEach(repo => {
                const repoDiv = document.createElement('div');
                repoDiv.className = 'repository';
                repoDiv.innerHTML = `
                    <h2><a href="${repo.html_url}">${repo.name}</a></h2>
                    <p>${repo.description || 'No description available'}</p>
                `;
                container.appendChild(repoDiv);
            });
        }

        fetchRepositories();
    </script>
</body>
</html>
