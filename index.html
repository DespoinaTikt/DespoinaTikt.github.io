<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despoina Tiktopoulou's Portfolio</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            padding: 20px;
            background-color: #f7f7f7;
            text-align: center;
            border-bottom: 1px solid #e1e4e8;
        }
        header h1 {
            margin: 0;
            font-size: 2em;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 1200px;
        }
        .laptop-image {
            width: 100%;
            max-width: 800px;
        }
        .repositories {
            margin-top: 40px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }
        .repository {
            background: #f7f7f7;
            padding: 20px;
            margin: 20px;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            width: 45%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .repository:hover {
            transform: translateY(-5px);
        }
        .repository h2 a {
            text-decoration: none;
            color: #0366d6;
            font-size: 1.5em;
        }
        .repository p {
            margin: 10px 0 0 0;
            font-size: 1em;
            line-height: 1.6;
        }
        footer {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #f7f7f7;
            border-top: 1px solid #e1e4e8;
            position: absolute;
            bottom: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Despoina Tiktopoulou's Portfolio</h1>
    </header>
    <div class="main-content">
        <img src="images/laptop-image.jpg" alt="Laptop" class="laptop-image">
        <div class="repositories" id="repositories">
            <!-- Repositories will be listed here -->
        </div>
    </div>
    <footer>
        <p>&copy; 2024 DespoinaTikt</p>
    </footer>

    <script>
        async function fetchRepositories() {
            const response = await fetch('https://api.github.com/users/DespoinaTikt/repos');
            const repositories = await response.json();
            const container = document.getElementById('repositories');

            repositories.forEach(repo => {
                const repoDiv = document.createElement('div');
                repoDiv.className = 'repository';
                repoDiv.innerHTML = `
                    <h2><a href="${repo.html_url}">${repo.name}</a></h2>
                    <p>${repo.description}</p>
                `;
                container.appendChild(repoDiv);
            });
        }

        fetchRepositories();
    </script>
</body>
</html>
